<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MU Continuity">
<title>Make Up Continuity</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#eee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --pink:#D4537E;--pink-light:#FBEAF0;--pink-text:#72243E;
  --teal-light:#E1F5EE;--teal-text:#0F6E56;
  --amber-light:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:#3a3a3c;--border2:#48484a;--pink-light:#3d1a28;--pink-text:#f4a7c3;--teal-light:#0a2e22;--teal-text:#5dcaa5;--amber-light:#2e1f00;--amber-text:#efb84a}}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);font-size:17px}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 16px 8px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg)}
.topbar-logo{width:34px;height:34px;object-fit:contain}
.topbar-title{font-size:18px;font-weight:700;flex:1}
.topbar-sub{font-size:12px;color:var(--text3);font-weight:400}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* PROJECT BAR */
.proj-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.proj-sel{font-size:15px;font-weight:500;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);flex:1;-webkit-appearance:none;appearance:none}
.btn{padding:9px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--text);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;-webkit-appearance:none}
.btn.primary{background:var(--pink);color:#fff;border-color:var(--pink)}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.danger{color:#e24b4a;border-color:#f09595;background:transparent}
.icon-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0}
.icon-btn.danger{color:#e24b4a;border-color:#f09595}

/* FICHE LIST */
.fiche-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.fiche-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.fiche-name{font-size:17px;font-weight:600}
.fiche-actor{font-size:14px;color:var(--text2);margin-top:2px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-ep{background:var(--pink-light);color:var(--pink-text)}
.badge-sc{background:var(--teal-light);color:var(--teal-text)}
.fiche-actions{display:flex;gap:6px;flex-shrink:0}
.scene-preview{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-top:8px;font-size:14px}
.scene-preview-title{font-size:13px;font-weight:700;color:var(--pink);margin-bottom:4px}
.scene-photos-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.scene-photo-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:0.5px solid var(--border);cursor:pointer}

/* FORM */
.form-section{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.form-section-title{font-size:14px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:16px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--pink)}
.form-row textarea{resize:vertical;min-height:80px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* SCENE BLOCK IN FORM */
.scene-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.scene-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.scene-block-label{font-size:14px;font-weight:700;color:var(--pink)}
.photos-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.photo-wrap{position:relative;width:72px;height:72px}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:0.5px solid var(--border);cursor:pointer}
.photo-del{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{width:72px;height:72px;border-radius:8px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:var(--bg);font-size:26px;color:var(--text3)}
.photo-add input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:var(--radius);object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-height:40vh;overflow-y:auto;padding:20px}
.sheet-title{font-size:17px;font-weight:600;margin-bottom:14px}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:15px}

/* PDF PRINT STYLES */
@media print{
  body{background:#fff!important;color:#000!important;font-size:11pt}
  #app{height:auto;overflow:visible}
  .topbar,.proj-bar,.fiche-actions,.btn,.no-print{display:none!important}
  .content{overflow:visible;padding:0}
  .view{display:block!important}
  .fiche-card{break-inside:avoid;border:1px solid #ddd;margin-bottom:16px;box-shadow:none}
  .pdf-header{display:flex!important}
  .scene-photo-thumb,.photo-thumb{width:80px!important;height:80px!important}
}
.pdf-header{display:none;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #D4537E}
.pdf-logo{width:50px;height:50px;object-fit:contain}
.pdf-title{font-size:20pt;font-weight:700;color:#D4537E}
.pdf-sub{font-size:11pt;color:#666}
</style>
</head>
<body>
<div id="app">
  <div class="topbar no-print">
    <img class="topbar-logo" id="topbar-logo" src="" alt="logo">
    <div>
      <div class="topbar-title">MU Continuity</div>
    </div>
  </div>

  <div class="content">
    <!-- PDF HEADER (visible only on print) -->
    <div class="pdf-header" id="pdf-header">
      <img class="pdf-logo" id="pdf-logo" src="" alt="logo">
      <div>
        <div class="pdf-title">Make Up Continuity</div>
        <div class="pdf-sub" id="pdf-proj-name"></div>
      </div>
    </div>

    <!-- VIEW: LISTE DES FICHES -->
    <div class="view active" id="view-list">
      <div class="proj-bar">
        <select class="proj-sel" id="proj-sel" onchange="switchProject(this.value)"></select>
        <div class="icon-btn" onclick="showNewProjSheet()" title="Nouveau projet">＋</div>
        <div class="icon-btn" onclick="showRenameProjSheet()" title="Renommer">✎</div>
        <div class="icon-btn danger" onclick="deleteProject()" title="Supprimer">✕</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <div class="btn primary" style="flex:1;justify-content:center" onclick="showFormView(null)">＋ Nouvelle fiche comédien</div>
        <div class="btn" onclick="printAll()" title="Imprimer / PDF">🖨 Imprimer tout</div>
      </div>
      <div id="fiches-list"></div>
    </div>

    <!-- VIEW: FORMULAIRE FICHE -->
    <div class="view" id="view-form">
      <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center" class="no-print">
        <div class="btn" onclick="showListView()">← Retour</div>
        <div style="font-size:17px;font-weight:600;flex:1" id="form-title">Nouvelle fiche</div>
        <div class="btn primary" onclick="saveFiche()">✓ Enregistrer</div>
      </div>

      <input type="hidden" id="f-id">

      <div class="form-section">
        <div class="form-section-title">👤 Comédien</div>
        <div class="form-2col">
          <div class="form-row"><label>Personnage *</label><input id="f-perso" placeholder="Ex: Anna"></div>
          <div class="form-row"><label>Acteur / actrice</label><input id="f-acteur"></div>
        </div>
        <div class="form-2col">
          <div class="form-row"><label>Épisode *</label><input id="f-ep" placeholder="Ex: EP03"></div>
          <div class="form-row"><label>Statut</label>
            <select id="f-statut">
              <option value="">—</option>
              <option value="Principal">Principal</option>
              <option value="Secondaire">Secondaire</option>
              <option value="Figurant">Figurant</option>
            </select>
          </div>
        </div>
        <div class="form-row"><label>Produits généraux</label><textarea id="f-produits" placeholder="Produits utilisés pour ce personnage..."></textarea></div>
        <div class="form-row"><label>Notes générales</label><textarea id="f-notes" placeholder="Observations générales..."></textarea></div>
      </div>

      <div class="form-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="form-section-title" style="margin-bottom:0">🎬 Scènes</div>
          <div class="btn sm primary" onclick="addScene()">＋ Scène</div>
        </div>
        <div id="scenes-container"></div>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px;margin-bottom:20px" class="no-print">
        <div class="btn" style="flex:1;justify-content:center" onclick="showListView()">Annuler</div>
        <div class="btn primary" style="flex:1;justify-content:center" onclick="saveFiche()">✓ Enregistrer</div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <div class="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- OVERLAY NOUVEAU PROJET -->
<div class="overlay" id="overlay-proj">
  <div class="sheet">
    <div class="sheet-title" id="overlay-proj-title">Nouveau projet</div>
    <div class="form-row"><label>Nom du projet</label><input id="overlay-proj-name" placeholder="Ex: Mortal Beings"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <div class="btn" style="flex:1;justify-content:center" onclick="closeOverlay('overlay-proj')">Annuler</div>
      <div class="btn primary" style="flex:1;justify-content:center" id="overlay-proj-btn" onclick="confirmProjAction()">✓ Créer</div>
    </div>
  </div>
</div>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function persist(){
  try{localStorage.setItem(STORE,JSON.stringify(db))}
  catch(e){alert('⚠️ Stockage plein. Les photos sont trop lourdes. Réduisez le nombre de photos par fiche.')}
}
function hydrate(){try{const d=localStorage.getItem(STORE);if(d)db=JSON.parse(d)}catch(e){}}

function proj(){return db.projects[db.currentId]}

function init(){
  hydrate();
  if(!Object.keys(db.projects).length){
    const a=uid(),b=uid();
    db.projects[a]={id:a,name:'Brothers',fiches:[]};
    db.projects[b]={id:b,name:'Mortal Beings',fiches:[]};
    db.currentId=a;persist();
  }
  if(!db.currentId||!db.projects[db.currentId])db.currentId=Object.keys(db.projects)[0];
  renderProjSel();renderFiches();
}

function renderProjSel(){
  const sel=document.getElementById('proj-sel');
  sel.innerHTML=Object.values(db.projects).map(p=>`<option value="${p.id}"${p.id===db.currentId?' selected':''}>${esc(p.name)}</option>`).join('');
  document.getElementById('pdf-proj-name').textContent=proj().name;
}
function switchProject(id){db.currentId=id;persist();renderProjSel();renderFiches()}

// PROJET OVERLAY
function showNewProjSheet(){projAction='new';document.getElementById('overlay-proj-title').textContent='Nouveau projet';document.getElementById('overlay-proj-btn').textContent='✓ Créer';document.getElementById('overlay-proj-name').value='';document.getElementById('overlay-proj').classList.add('open')}
function showRenameProjSheet(){projAction='rename';document.getElementById('overlay-proj-title').textContent='Renommer';document.getElementById('overlay-proj-btn').textContent='✓ Renommer';document.getElementById('overlay-proj-name').value=proj().name;document.getElementById('overlay-proj').classList.add('open')}
function closeOverlay(id){document.getElementById(id).classList.remove('open')}
function confirmProjAction(){
  const name=document.getElementById('overlay-proj-name').value.trim();if(!name)return;
  if(projAction==='new'){const id=uid();db.projects[id]={id,name,fiches:[]};db.currentId=id;}
  else{proj().name=name;}
  closeOverlay('overlay-proj');persist();renderProjSel();renderFiches();
}
function deleteProject(){
  if(Object.keys(db.projects).length<=1){alert('Un projet minimum requis.');return}
  if(!confirm(`Supprimer "${proj().name}" ?`))return;
  delete db.projects[db.currentId];db.currentId=Object.keys(db.projects)[0];persist();renderProjSel();renderFiches();
}

// VIEWS
function showListView(){document.getElementById('view-list').classList.add('active');document.getElementById('view-form').classList.remove('active');renderFiches()}
function showFormView(id){
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-form').classList.add('active');
  scenePhotos={};
  document.getElementById('scenes-container').innerHTML='';
  if(id){
    const f=proj().fiches.find(x=>x.id===id);
    document.getElementById('form-title').textContent='Modifier la fiche';
    document.getElementById('f-id').value=f.id;
    document.getElementById('f-perso').value=f.perso||'';
    document.getElementById('f-acteur').value=f.acteur||'';
    document.getElementById('f-ep').value=f.ep||'';
    document.getElementById('f-statut').value=f.statut||'';
    document.getElementById('f-produits').value=f.produits||'';
    document.getElementById('f-notes').value=f.notes||'';
    (f.scenes||[]).forEach(s=>addScene(s));
  } else {
    document.getElementById('form-title').textContent='Nouvelle fiche';
    document.getElementById('f-id').value='';
    ['f-perso','f-acteur','f-ep','f-produits','f-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-statut').value='';
    addScene();
  }
}

// SCENES
function sceneSort(a,b){return (parseInt((a.num||'').replace(/\D/g,''))||0)-(parseInt((b.num||'').replace(/\D/g,''))||0)}

function addScene(s){
  const idx=uid();
  scenePhotos[idx]=s&&s.photos?[...s.photos]:[];
  const div=document.createElement('div');
  div.className='scene-block';div.dataset.idx=idx;
  div.innerHTML=`
    <div class="scene-block-header">
      <span class="scene-block-label">Scène</span>
      <div class="btn sm danger" onclick="removeScene(this)">✕ Supprimer</div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Numéro</label><input class="sc-num" placeholder="Ex: SC01" value="${esc(s&&s.num?s.num:'')}"></div>
      <div class="form-row"><label>Jour de tournage</label><input class="sc-jour" placeholder="Ex: J12" value="${esc(s&&s.jour?s.jour:'')}"></div>
    </div>
    <div class="form-row"><label>✂ Coiffure</label><textarea class="sc-coiffure" placeholder="Description coiffure...">${esc(s&&s.coiffure?s.coiffure:'')}</textarea></div>
    <div class="form-row"><label>✦ Maquillage</label><textarea class="sc-makeup" placeholder="Description maquillage...">${esc(s&&s.makeup?s.makeup:'')}</textarea></div>
    <div class="form-row"><label>📝 Notes continuité</label><textarea class="sc-notes" placeholder="Détails importants...">${esc(s&&s.notes?s.notes:'')}</textarea></div>
    <div class="form-row"><label>📷 Photos</label><div class="photos-strip sc-photos" data-idx="${idx}"></div></div>
  `;
  document.getElementById('scenes-container').appendChild(div);
  renderPhotoStrip(idx);
}

function removeScene(btn){
  const div=btn.closest('.scene-block');
  delete scenePhotos[div.dataset.idx];
  div.remove();
}

function renderPhotoStrip(idx){
  const strip=document.querySelector(`.sc-photos[data-idx="${idx}"]`);if(!strip)return;
  strip.innerHTML='';
  (scenePhotos[idx]||[]).forEach((src,i)=>{
    const w=document.createElement('div');w.className='photo-wrap';
    w.innerHTML=`<img src="${src}" class="photo-thumb" onclick="lightbox('${src}')" alt="photo"><button class="photo-del" onclick="delPhoto('${idx}',${i})">×</button>`;
    strip.appendChild(w);
  });
  const add=document.createElement('div');add.className='photo-add';
  add.innerHTML=`＋<input type="file" accept="image/*" multiple onchange="addPhotos(event,'${idx}')">`;
  strip.appendChild(add);
}

function delPhoto(idx,i){scenePhotos[idx].splice(i,1);renderPhotoStrip(idx)}

function compressImg(file,cb){
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=900;let w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.72));
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
}

function addPhotos(e,idx){
  [...e.target.files].forEach(f=>compressImg(f,src=>{scenePhotos[idx].push(src);renderPhotoStrip(idx)}));
}

function collectScenes(){
  return [...document.querySelectorAll('.scene-block')].map(div=>{
    const idx=div.dataset.idx;
    return{num:div.querySelector('.sc-num').value.trim(),jour:div.querySelector('.sc-jour').value.trim(),coiffure:div.querySelector('.sc-coiffure').value.trim(),makeup:div.querySelector('.sc-makeup').value.trim(),notes:div.querySelector('.sc-notes').value.trim(),photos:[...(scenePhotos[idx]||[])]};
  }).sort(sceneSort);
}

function saveFiche(){
  const perso=document.getElementById('f-perso').value.trim();
  const ep=document.getElementById('f-ep').value.trim();
  if(!perso||!ep){alert('Personnage et épisode obligatoires.');return}
  const id=document.getElementById('f-id').value||uid();
  const obj={id,perso,acteur:document.getElementById('f-acteur').value.trim(),ep,statut:document.getElementById('f-statut').value,produits:document.getElementById('f-produits').value.trim(),notes:document.getElementById('f-notes').value.trim(),scenes:collectScenes()};
  const idx=proj().fiches.findIndex(f=>f.id===id);
  if(idx>-1)proj().fiches[idx]=obj;else proj().fiches.push(obj);
  persist();showListView();
}

function deleteFiche(id){
  if(!confirm('Supprimer cette fiche ?'))return;
  proj().fiches=proj().fiches.filter(f=>f.id!==id);persist();renderFiches();
}

function renderFiches(){
  const el=document.getElementById('fiches-list');
  const fiches=proj().fiches;
  if(!fiches.length){el.innerHTML=`<div class="empty"><div class="empty-icon">👤</div><p>Aucune fiche.<br>Créez votre première fiche comédien.</p></div>`;return}
  el.innerHTML=fiches.map(f=>{
    const scenes=[...(f.scenes||[])].sort(sceneSort);
    return`<div class="fiche-card">
      <div class="fiche-card-header">
        <div>
          <div class="fiche-name">${esc(f.perso)}${f.statut?` <span style="font-size:12px;font-weight:400;color:var(--text2)">(${esc(f.statut)})</span>`:''}</div>
          ${f.acteur?`<div class="fiche-actor">${esc(f.acteur)}</div>`:''}
          <div class="badges">
            <span class="badge badge-ep">▶ ${esc(f.ep)}</span>
            ${scenes.filter(s=>s.num).map(s=>`<span class="badge badge-sc">${esc(s.num)}</span>`).join('')}
          </div>
        </div>
        <div class="fiche-actions">
          <div class="btn sm" onclick="printFiche('${f.id}')">🖨</div>
          <div class="btn sm" onclick="showFormView('${f.id}')">✎</div>
          <div class="btn sm danger" onclick="deleteFiche('${f.id}')">✕</div>
        </div>
      </div>
      ${scenes.length?scenes.map(s=>`
        <div class="scene-preview">
          <div class="scene-preview-title">${s.num?'Scène '+esc(s.num):'Scène'}${s.jour?' — '+esc(s.jour):''}</div>
          ${s.coiffure?`<div><strong>Coiffure :</strong> ${esc(s.coiffure)}</div>`:''}
          ${s.makeup?`<div><strong>Maquillage :</strong> ${esc(s.makeup)}</div>`:''}
          ${s.notes?`<div><strong>Notes :</strong> ${esc(s.notes)}</div>`:''}
          ${s.photos&&s.photos.length?`<div class="scene-photos-strip">${s.photos.map(p=>`<img src="${p}" class="scene-photo-thumb" onclick="lightbox('${p}')" alt="photo">`).join('')}</div>`:''}
        </div>`).join(''):''}
    </div>`;
  }).join('');
}

// PRINT
function printFiche(id){
  // Hide all fiches except this one
  const all=document.querySelectorAll('.fiche-card');
  all.forEach(c=>c.style.display='none');
  const cards=document.querySelectorAll('.fiche-card');
  const fiches=proj().fiches;
  const idx=fiches.findIndex(f=>f.id===id);
  if(idx>-1&&cards[idx])cards[idx].style.display='';
  document.getElementById('pdf-proj-name').textContent=proj().name+' — '+fiches[idx].perso;
  window.print();
  all.forEach(c=>c.style.display='');
}

function printAll(){
  document.getElementById('pdf-proj-name').textContent=proj().name;
  window.print();
}

function lightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open')}

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
init();
</script>
</body>
</html>
